<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Configurar rutas</title>
  <link rel="stylesheet" href="css/scoreboard.css">
  <style>
    body {
      background: var(--bg-primary);
      margin: 0;
      font-family: 'Montserrat', Arial, sans-serif;
    }

    .rutas-panel {
      margin-top: 2em;
    }

    fieldset {
      border: 1px solid var(--border-color) !important;
      border-radius: var(--border-radius);
      padding: 2em 2.5em 1.5em 2.5em;
      max-width: 600px;
      margin: 2em auto 2.5em auto;
      background: var(--bg-secondary) !important;
      box-shadow: none;
    }

    legend {
      font-size: 1.3em;
      font-weight: bold;
      color: var(--text-primary) !important;
      padding: 0 0.7em;
      letter-spacing: 1px;
    }

    .form-row {
      display: flex;
      align-items: center;
      gap: 0.5em;
      margin-bottom: 1.2em;
    }

    .sb-input {
      background: var(--bg-primary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      border-radius: var(--border-radius);
      padding: 0.4em 0.8em;
      font-size: 1em;
      width: 320px;
    }

    .sb-btn {
      background: var(--primary-color);
      color: #fff;
      font-weight: bold;
      border: none;
      border-radius: var(--border-radius);
      padding: 0.4em 1.2em;
      cursor: pointer;
      transition: background 0.2s;
    }

    .sb-btn:hover {
      filter: brightness(1.08);
    }

    .footer-msg {
      color: var(--text-secondary);
      text-align: center;
      margin-top: 2em;
      font-size: 0.95em;
      opacity: 0.7;
    }
  </style>
</head>

<body style="background:transparent; margin:0;">
  <div id="tab-rutas" style="padding:2em 1em 1em 1em; max-width:600px; margin:0 auto;">
    <h2 style="font-size:1.3em; margin-bottom:1.2em; text-align:center;" class="text-accent">Configurar rutas de
      archivos</h2>
    <div style="margin-bottom:1.5em; font-size:1em; text-align:center;" class="text-muted">
      <span class="text-warning" style="font-weight:bold;">¡Importante!</span> Selecciona la ubicación de cada archivo
      principal.<br>
      <span class="text-accent">Puedes dejar una ruta vacía para usar la ubicación por defecto.</span>
    </div>
  </div>
  <div class="form-row principal"
    style="background:var(--bg-secondary); border-left:4px solid var(--primary-color); border-radius:6px; padding:0.5em 0.5em; margin-bottom:1.2em;">
    <label for="rutaScoreboard" style="min-width:160px; font-weight:bold;" class="text-muted">Scoreboard JSON:</label>
    <input id="rutaScoreboard" class="sb-input principal" readonly>
    <button class="sb-btn btn-secondary principal" id="btnScoreboard">Elegir...</button>
  </div>
  <div class="form-row principal"
    style="background:var(--bg-secondary); border-left:4px solid var(--primary-color); border-radius:6px; padding:0.5em 0.5em; margin-bottom:1.2em;">
    <label for="rutaCasters" style="min-width:160px; font-weight:bold;" class="text-muted">Casters JSON:</label>
    <input id="rutaCasters" class="sb-input principal" readonly>
    <button class="sb-btn btn-secondary principal" id="btnCasters">Elegir...</button>
  </div>
  <div class="form-row principal"
    style="background:var(--bg-secondary); border-left:4px solid var(--primary-color); border-radius:6px; padding:0.5em 0.5em; margin-bottom:1.2em;">
    <label for="rutaTimestamp" style="min-width:160px; font-weight:bold;" class="text-muted">Timestamp JSON:</label>
    <input id="rutaTimestamp" class="sb-input principal" readonly>
    <button class="sb-btn btn-secondary principal" id="btnTimestamp">Elegir...</button>
  </div>
  <div class="form-row principal"
    style="background:var(--bg-secondary); border-left:4px solid var(--primary-color); border-radius:6px; padding:0.5em 0.5em; margin-bottom:1.2em;">
    <label for="rutaBracket" style="min-width:160px; font-weight:bold;" class="text-muted">Bracket JSON:</label>
    <input id="rutaBracket" class="sb-input principal" readonly>
    <button class="sb-btn btn-secondary principal" id="btnBracket">Elegir...</button>
  </div>
  <div class="form-row principal"
    style="background:var(--bg-secondary); border-left:4px solid var(--primary-color); border-radius:6px; padding:0.5em 0.5em; margin-bottom:1.2em;">
    <label for="rutaTop8" style="min-width:160px; font-weight:bold;" class="text-muted">Top8 JSON:</label>
    <input id="rutaTop8" class="sb-input principal" readonly>
    <button class="sb-btn btn-secondary principal" id="btnTop8">Elegir...</button>
  </div>
  <div class="form-row" style="margin-bottom:1.7em;">
    <label for="rutaApiKey" style="min-width:160px;" class="text-muted">API Key JSON:</label>
    <input id="rutaApiKey" class="sb-input" readonly>
    <button class="sb-btn btn-secondary" id="btnApiKey">Elegir...</button>
  </div>
  <div class="form-row" style="margin-bottom:1.2em; align-items:center;">
    <label for="rutaUsuarios" style="min-width:160px;" class="text-muted">Usuarios TXT:</label>
    <input id="rutaUsuarios" class="sb-input" style="width:320px;" readonly>
    <button class="sb-btn btn-secondary" id="btnUsuarios">Elegir...</button>
  </div>
  <div class="form-row" style="justify-content: flex-end;">
    <button class="sb-btn btn-success guardar" id="btnGuardarRutas" onclick="guardarTodasLasRutas()">Guardar
      todo</button>
  </div>
  <div id="msgFeedback" class="footer-msg" style="display:none;"></div>
  </div>
  <script>
    const ipcRenderer = window.__TAURI__;
    function rutaId(tipo) {
      if (tipo === 'apikey') return 'rutaApiKey';
      return 'ruta' + tipo.charAt(0).toUpperCase() + tipo.slice(1);
    }
    async function elegirRuta(tipo, btn) {
      if (btn) {
        btn.disabled = true;
        btn.textContent = '...';
      }
      const res = await window.__TAURI__.core.invoke('elegir-ruta', { tipo });
      if (btn) {
        btn.disabled = false;
        btn.textContent = 'Elegir...';
      }
      if (res.ok && res.ruta) {
        document.getElementById(rutaId(tipo)).value = res.ruta;
        // Guarda todas las rutas actuales
        const rutas = {};
        for (const t of ['scoreboard', 'casters', 'timestamp', 'bracket', 'top8', 'apikey', 'usuarios']) {
          rutas[t] = document.getElementById(rutaId(t)).value;
        }
        await window.__TAURI__.core.invoke('guardar-rutas', { rutas });
        mostrarFeedback('Ruta guardada para ' + tipo, true);
      } else if (res.ok === false) {
        mostrarFeedback('No se seleccionó ninguna ruta.', false);
      }
    }
    async function guardarTodasLasRutas() {
      const btn = document.getElementById('btnGuardarRutas');
      btn.disabled = true;
      btn.textContent = 'Guardando...';
      const rutas = {};
      for (const t of ['scoreboard', 'casters', 'timestamp', 'bracket', 'top8', 'apikey', 'usuarios']) {
        rutas[t] = document.getElementById(rutaId(t)).value;
      }
      await window.__TAURI__.core.invoke('guardar-rutas', { rutas });
      mostrarFeedback('¡Rutas guardadas!', true);
      setTimeout(() => { btn.disabled = false; btn.textContent = 'Guardar todo'; }, 900);
    }
    function mostrarFeedback(msg, ok) {
      const el = document.getElementById('msgFeedback');
      el.textContent = msg;
      el.style.display = 'block';
      el.style.color = ok ? 'var(--success-color)' : 'var(--error-color)';
      el.style.fontWeight = ok ? 'bold' : 'normal';
      setTimeout(() => { el.style.display = 'none'; }, 1800);
    }
    // Cargar rutas al abrir la pestaña y asignar listeners
    window.addEventListener('DOMContentLoaded', async () => {
      const res = await window.__TAURI__.core.invoke('cargar-rutas');
      if (res.ok && res.rutas) {
        for (const tipo of ['scoreboard', 'casters', 'timestamp', 'bracket', 'top8', 'apikey', 'usuarios']) {
          if (res.rutas[tipo]) {
            document.getElementById(rutaId(tipo)).value = res.rutas[tipo];
          }
        }
      }
      // Asignar listeners a los botones
      document.getElementById('btnScoreboard').addEventListener('click', function (e) { elegirRuta('scoreboard', this); });
      document.getElementById('btnCasters').addEventListener('click', function (e) { elegirRuta('casters', this); });
      document.getElementById('btnTimestamp').addEventListener('click', function (e) { elegirRuta('timestamp', this); });
      document.getElementById('btnBracket').addEventListener('click', function (e) { elegirRuta('bracket', this); });
      document.getElementById('btnTop8').addEventListener('click', function (e) { elegirRuta('top8', this); });
      document.getElementById('btnApiKey').addEventListener('click', function (e) { elegirRuta('apikey', this); });
      document.getElementById('btnUsuarios').addEventListener('click', function (e) { elegirRuta('usuarios', this); });
    });
  </script>
</body>

</html>
